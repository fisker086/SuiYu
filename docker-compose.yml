# SuiYu Agent 服务端 — Docker Compose
#
# 适用场景：无本仓库源码、仅持本文件与 .env 即可部署（镜像从仓库拉取）。
# 默认包含 PostgreSQL + pgvector；`docker compose up -d` 即可。
# 若使用外部 Postgres，可在 .env 中设置 DATABASE_URL 覆盖默认连接串（仍会启动内置 postgres，高级场景可用 override 禁用）。
#
name: suiyu-agent

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-sya}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - suiyu-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  app:
    # 无源码时从镜像运行；可改 .env 中的 SYA_IMAGE 指向你的私有仓库
    image: ${SYA_IMAGE:-ghcr.nju.edu.cn/fisker086/suiyu-agent:latest}
    restart: unless-stopped
    # 若在本仓库内从 Dockerfile 构建，请改用下面三行并注释掉上面的 image：
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-sya}?sslmode=disable}
      SERVER_PORT: ${SERVER_PORT:-8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-text}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-use-openssl-rand-hex-32}
      MODEL_TYPE: ${MODEL_TYPE:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_BY_AZURE: ${OPENAI_BY_AZURE:-false}
      ARK_API_KEY: ${ARK_API_KEY:-}
      ARK_MODEL: ${ARK_MODEL:-}
      ARK_BASE_URL: ${ARK_BASE_URL:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://api.openai.com/v1}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1536}
      MEMORY_PROVIDER: ${MEMORY_PROVIDER:-pgvector}
      MEMORY_RETRIEVE_TOP_K: ${MEMORY_RETRIEVE_TOP_K:-8}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
      ADMIN_WHITELIST: ${ADMIN_WHITELIST:-}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:-changeme}
      DISABLE_LOGIN_CAPTCHA: ${DISABLE_LOGIN_CAPTCHA:-false}
      SKILLS_DIR: /app/skills
      UPLOAD_DIR: /app/data/uploads
    volumes:
      # Mount repo skills so new SKILL.md dirs appear without rebuilding the image (dev / hot-add).
      - ./skills:/app/skills:ro
      - app_uploads:/app/data/uploads
      # Docker socket for sandbox execution (required for SANDBOX_TYPE=docker)
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  suiyu-pg:
  app_uploads:

